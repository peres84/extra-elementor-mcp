name: PHP Checks

on:
  push:
    branches: [main]
    paths:
      - '**.php'
      - '.github/workflows/php-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.php'
      - '.github/workflows/php-checks.yml'

jobs:
  syntax-check:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: php-parallel-lint

      - name: Check PHP syntax
        run: parallel-lint --exclude vendor --exclude samples .

  coding-standards:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: cs2pr, phpcs, composer

      - name: Install WordPress Coding Standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --dev wp-coding-standards/wpcs:"^3.0" phpcompatibility/phpcompatibility-wp:"*"

      - name: Run PHPCS
        run: |
          phpcs --standard=WordPress --extensions=php \
            --ignore=vendor/*,samples/*,node_modules/* \
            --report=checkstyle \
            . | cs2pr
        continue-on-error: true

  static-analysis:
    name: Static Analysis (PHPStan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpstan

      - name: Create PHPStan config
        run: |
          cat > phpstan.neon <<'NEON'
          parameters:
            level: 5
            paths:
              - extra-elementor-mcp.php
              - includes/
            excludePaths:
              - vendor/
              - samples/
            ignoreErrors:
              - '#Function wp_.*not found#'
              - '#Function get_option not found#'
              - '#Function update_option not found#'
              - '#Function current_user_can not found#'
              - '#Function sanitize_text_field not found#'
              - '#Function esc_html not found#'
              - '#Function esc_attr not found#'
              - '#Function esc_url not found#'
              - '#Function wp_kses_post not found#'
              - '#Function absint not found#'
              - '#Function add_action not found#'
              - '#Function add_filter not found#'
              - '#Function do_action not found#'
              - '#Function apply_filters not found#'
              - '#Function __ not found#'
              - '#Function _e not found#'
              - '#Class ACF not found#'
              - '#Constant WPSEO_VERSION not found#'
              - '#Function acf_.*not found#'
              - '#Function get_fields not found#'
              - '#Function update_field not found#'
          NEON

      - name: Run PHPStan
        run: phpstan analyse --no-progress
        continue-on-error: true

  security-check:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Check for common security issues
        run: |
          echo "=== Checking for direct DB queries (should use WP API) ==="
          grep -rn '\$wpdb->' --include="*.php" --exclude-dir=vendor --exclude-dir=samples . || echo "OK: No direct DB queries found"

          echo ""
          echo "=== Checking for eval/exec usage ==="
          grep -rn '\beval\s*(' --include="*.php" --exclude-dir=vendor --exclude-dir=samples . || echo "OK: No eval() found"
          grep -rn '\bexec\s*(' --include="*.php" --exclude-dir=vendor --exclude-dir=samples . || echo "OK: No exec() found"
          grep -rn '\bsystem\s*(' --include="*.php" --exclude-dir=vendor --exclude-dir=samples . || echo "OK: No system() found"
          grep -rn '\bpassthru\s*(' --include="*.php" --exclude-dir=vendor --exclude-dir=samples . || echo "OK: No passthru() found"
          grep -rn '\bshell_exec\s*(' --include="*.php" --exclude-dir=vendor --exclude-dir=samples . || echo "OK: No shell_exec() found"

          echo ""
          echo "=== Checking for unescaped output (echo without esc_) ==="
          grep -rn 'echo\s\+\$' --include="*.php" --exclude-dir=vendor --exclude-dir=samples includes/admin/ 2>/dev/null || echo "OK: No unescaped echo in admin views"

          echo ""
          echo "=== Checking for missing capability checks ==="
          grep -rln 'function.*callback\|function.*handler\|function.*execute' --include="*.php" --exclude-dir=vendor --exclude-dir=samples includes/abilities/ 2>/dev/null | while read f; do
            if ! grep -q 'current_user_can' "$f"; then
              echo "WARNING: $f may be missing capability checks"
            fi
          done || echo "OK: No ability files to check yet"
